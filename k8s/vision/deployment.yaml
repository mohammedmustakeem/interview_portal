apiVersion: apps/v1
kind: Deployment
metadata:
  name: vision-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vision-service
  template:
    metadata:
      labels:
        app: vision-service
    spec:
      containers:
        - name: vision-service
          image: your-dockerhub/vision-service
          ports:
            - containerPort: 8002
          resources:
            requests:
              cpu: "2"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "4Gi"