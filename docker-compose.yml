services:

  interview:
    build: ./interview_service
    ports:
      - "10000:10000"
    env_file:
      - .env
    volumes:
      - ./interview_service/practice/data/question_bank:/app/practice/data/question_bank

  voice:
    build: ./voice_service
    ports:
      - "8001:8001"
    env_file:
      - .env

  vision:
    build: ./vision_service
    ports:
      - "8002:8002"
    environment:
      - MEDIAPIPE_DISABLE_GPU=1


      