apiVersion: apps/v1
kind: Deployment
metadata:
  name: interview-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: interview-service
  template:
    metadata:
      labels:
        app: interview-service
    spec:
      containers:
        - name: interview-service
          image: your-dockerhub/interview-service
          ports:
            - containerPort: 10000
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"